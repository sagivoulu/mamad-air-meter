<style>body{margin:0;min-height:100vh;background:linear-gradient(160deg,#e8f0fe 0%,#f1f5f9 100%);background-attachment:fixed}</style>
<div id="app" style="max-width:820px;margin:0 auto;font-family:system-ui,sans-serif;color:#1e293b;padding:16px"></div>
<script>
var CEIL = 2.5, START_PCT = 0.04, CO2_HR = 12;

var DOORS = [
  {label:"Quick open/close (~5 sec)",exchange:0.04,desc:"Door sweep + person walking through"},
  {label:"Open 1 minute",exchange:0.15,desc:"Some buoyancy-driven exchange"},
  {label:"Open 2 minutes",exchange:0.27,desc:"Meaningful air exchange"},
  {label:"Open 5 minutes",exchange:0.55,desc:"Substantial exchange"},
  {label:"Open 10 minutes",exchange:0.85,desc:"Near-complete exchange"}
];

var LEGEND = [
  {bg:"#dcfce7",t:"#166534",l:"Safe",r:"CO2 below 1%",d:"Normal indoor air quality. No symptoms. Equivalent to a well-ventilated room."},
  {bg:"#fef9c3",t:"#854d0e",l:"OK",r:"CO2 1-2%",d:"Stuffy but harmless. Slight drowsiness possible. No health risk."},
  {bg:"#fed7aa",t:"#9a3412",l:"Caution",r:"CO2 2-3%",d:"Headaches, drowsiness, reduced concentration. Ventilate soon."},
  {bg:"#fecaca",t:"#991b1b",l:"Unsafe",r:"CO2 3-5%",d:"Dizziness, elevated heart rate, difficulty concentrating. Ventilate immediately."},
  {bg:"#991b1b",t:"#fff",l:"Danger",r:"CO2 above 5%",d:"Nausea, confusion, impaired consciousness. Life-threatening. Leave the room."}
];

function badge(co2){
  var bg,tc,lb;
  if(co2<1){bg="#dcfce7";tc="#166534";lb="Safe";}
  else if(co2<2){bg="#fef9c3";tc="#854d0e";lb="OK";}
  else if(co2<3){bg="#fed7aa";tc="#9a3412";lb="Caution";}
  else if(co2<5){bg="#fecaca";tc="#991b1b";lb="Unsafe";}
  else{bg="#991b1b";tc="#fff";lb="Danger";}
  return '<span style="padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;white-space:nowrap;display:inline-block;background:'+bg+';color:'+tc+'">'+lb+'</span>';
}

function bar(val,max,color){
  var w=Math.min(100,(val/max)*100);
  return '<div style="width:100%;height:10px;background:#e5e7eb;border-radius:5px;overflow:hidden"><div style="height:100%;border-radius:5px;transition:width 0.3s;width:'+w+'%;background:'+color+'"></div></div>';
}

function bcol(co2){return co2>=3?"#ef4444":co2>=2?"#f97316":"#22c55e";}

function fh(h){
  if(h<1)return Math.round(h*60)+"m";
  var hrs=Math.floor(h),mins=Math.round((h-hrs)*60);
  return mins>0?hrs+"h "+mins+"m":hrs+"h";
}

function render(){
  var W=parseFloat(document.getElementById("rW").value);
  var L=parseFloat(document.getElementById("rL").value);
  var P=parseInt(document.getElementById("ppl").value);
  var H=parseInt(document.getElementById("hrs").value);
  document.getElementById("wV").textContent=W;
  document.getElementById("lV").textContent=L;
  document.getElementById("pV").textContent=P;
  document.getElementById("hV").textContent=H;

  var vol=W*L*CEIL*1000;
  var sL=(START_PCT/100)*vol;
  var co2=(sL+CO2_HR*P*H)/vol*100;
  var pw=P===1?"person":"people";
  var cc=co2>=3?"#dc2626":co2>=2?"#ea580c":"#334155";

  document.getElementById("ri").innerHTML='<span><b>Room:</b> '+W+' x '+L+' x '+CEIL+'m</span><span><b>Volume:</b> '+(vol/1000).toFixed(1)+' m3 ('+vol.toLocaleString()+' L)</span><span><b>Floor:</b> '+(W*L).toFixed(1)+' m2</span>';

  var o='<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:8px">';
  o+='<span style="font-size:14px;font-weight:600">CO2 after '+H+'h with '+P+' '+pw+':</span>';
  o+='<span style="font-size:24px;font-weight:800;color:'+cc+'">'+co2.toFixed(2)+'%</span>';
  o+=badge(co2)+'</div>';
  o+=bar(co2,6,bcol(co2));
  o+='<div style="display:flex;justify-content:space-between;font-size:10px;color:#94a3b8;margin-top:2px"><span>0%</span><span>1%</span><span>2%</span><span>3% Unsafe</span><span>5% Danger</span><span>6%</span></div>';
  document.getElementById("cur").innerHTML=o;

  var th=[{l:"Discomfort (2%)",p:2,bg:"#fef9c3",bd:"#fde68a",tc:"#854d0e"},{l:"Unsafe (3%)",p:3,bg:"#fed7aa",bd:"#fdba74",tc:"#9a3412"},{l:"Dangerous (5%)",p:5,bg:"#fecaca",bd:"#fca5a5",tc:"#991b1b"}];
  var t='';
  for(var i=0;i<th.length;i++){
    var x=th[i],tm=((x.p/100)*vol-sL)/(CO2_HR*P);
    t+='<div style="flex:1;min-width:140px;padding:12px;border-radius:10px;text-align:center;background:'+x.bg+';border:1px solid '+x.bd+'">';
    t+='<div style="font-size:11px;font-weight:600;color:'+x.tc+';margin-bottom:4px">'+x.l+'</div>';
    t+='<div style="font-size:20px;font-weight:800;color:'+x.tc+'">'+fh(tm)+'</div></div>';
  }
  document.getElementById("thr").innerHTML=t;

  var fr=0.04,sc='';
  for(var j=0;j<DOORS.length;j++){
    var d=DOORS[j];
    var af=fr+(co2-fr)*(1-d.exchange);
    var dr=co2-af;
    var pd=co2>0.04?(dr/(co2-fr))*100:0;
    var rs=af<0.5;
    sc+='<div style="padding:14px;background:#fff;border-radius:10px;margin-bottom:8px;position:relative;border:'+(rs?'2px solid #22c55e':'1px solid #e2e8f0')+'">';
    if(rs)sc+='<span style="position:absolute;top:-8px;right:12px;background:#22c55e;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px">FULL RESET</span>';
    sc+='<div style="display:flex;align-items:center;gap:12px;margin-bottom:6px;flex-wrap:wrap">';
    sc+='<span style="font-size:13px;font-weight:700;min-width:200px">'+d.label+'</span>';
    sc+='<span style="font-size:12px;color:#64748b">~'+Math.round(d.exchange*100)+'% air exchanged</span></div>';
    sc+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">';
    sc+='<span style="font-size:13px;min-width:50px;color:#94a3b8">Before</span>';
    sc+='<div style="flex:1">'+bar(co2,6,"#94a3b8")+'</div>';
    sc+='<span style="font-size:13px;font-weight:600;min-width:55px;text-align:right">'+co2.toFixed(2)+'%</span>';
    sc+=badge(co2)+'</div>';
    sc+='<div style="display:flex;align-items:center;gap:10px">';
    sc+='<span style="font-size:13px;min-width:50px;color:#2563eb;font-weight:600">After</span>';
    sc+='<div style="flex:1">'+bar(af,6,bcol(af))+'</div>';
    sc+='<span style="font-size:13px;font-weight:700;min-width:55px;text-align:right;color:#2563eb">'+af.toFixed(2)+'%</span>';
    sc+=badge(af)+'</div>';
    sc+='<div style="font-size:11px;color:#64748b;margin-top:4px">'+d.desc+' | Drops by '+dr.toFixed(2)+'% ('+Math.round(pd)+'% toward fresh)</div>';
    sc+='</div>';
  }
  document.getElementById("scn").innerHTML=sc;
}

function init(){
  var a=document.getElementById("app");
  var h='<h2 style="font-size:22px;font-weight:700;margin-bottom:4px">Mamad Air Quality Calculator</h2>';
  h+='<p style="font-size:13px;color:#64748b;margin-bottom:16px">Ceiling: 2.5m | No wind | Sleeping adults | Worst-case sealed room</p>';

  h+='<div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:12px;padding:18px;margin-bottom:24px;font-size:14px;line-height:1.7;color:#1e3a5f">';
  h+='<p style="margin:0 0 10px"><b>What is this?</b> In Israel, many homes have a <b>mamad (ממ"ד)</b> — a reinforced safe room. During a missile alert, you seal the door and shelter inside. But with the door sealed, the room is essentially airtight: no fresh air comes in, and everyone inside slowly raises the CO2 level just by breathing.</p>';
  h+='<p style="margin:0 0 10px">This raises a practical question: <b>is it safe to sleep through the night in a sealed mamad?</b> CO2 buildup causes headaches, drowsiness, and at high enough levels becomes dangerous — but how quickly does that actually happen?</p>';
  h+='<p style="margin:0 0 12px"><b>How to use this calculator:</b></p>';
  h+='<ol style="margin:0;padding-left:20px">';
  h+='<li style="margin-bottom:6px"><b>Set your mamad\'s dimensions</b> — width and length (ceiling height is fixed at the standard 2.5m)</li>';
  h+='<li style="margin-bottom:6px"><b>Set the number of people</b> sleeping inside</li>';
  h+='<li style="margin-bottom:6px"><b>Set how many hours</b> you plan to stay sealed</li>';
  h+='<li><b>Read the results</b> — see the current CO2 level, how long until each safety threshold is crossed, and how much opening the door helps</li>';
  h+='</ol>';
  h+='</div>';

  h+='<div style="background:#fefce8;border:1px solid #fde047;border-radius:10px;padding:14px;margin-bottom:20px;font-size:12px;line-height:1.6;color:#713f12">';
  h+='<b>Disclaimer:</b> This is a hobby project built out of personal curiosity. The calculations are based on publicly available research and reasonable assumptions, but they have not been scientifically validated. Do not rely on this tool for life-safety decisions. When in doubt, ventilate.';
  h+='</div>';

  h+='<div style="background:#f8fafc;border-radius:10px;border:1px solid #e2e8f0;padding:16px;margin-bottom:20px">';
  h+='<div style="display:flex;gap:20px;flex-wrap:wrap;margin-bottom:12px">';
  h+='<div style="flex:1;min-width:140px"><label style="font-size:13px;font-weight:600;display:block;margin-bottom:6px">Room width: <span id="wV" style="color:#7c3aed;font-size:18px">3</span>m</label><input type="range" id="rW" min="1.5" max="6" step="0.5" value="3" style="width:100%"><div style="display:flex;justify-content:space-between;font-size:11px;color:#94a3b8"><span>1.5m</span><span>6m</span></div></div>';
  h+='<div style="flex:1;min-width:140px"><label style="font-size:13px;font-weight:600;display:block;margin-bottom:6px">Room length: <span id="lV" style="color:#7c3aed;font-size:18px">3</span>m</label><input type="range" id="rL" min="1.5" max="6" step="0.5" value="3" style="width:100%"><div style="display:flex;justify-content:space-between;font-size:11px;color:#94a3b8"><span>1.5m</span><span>6m</span></div></div>';
  h+='</div>';
  h+='<div style="display:flex;gap:20px;flex-wrap:wrap">';
  h+='<div style="flex:1;min-width:140px"><label style="font-size:13px;font-weight:600;display:block;margin-bottom:6px">People: <span id="pV" style="color:#2563eb;font-size:18px">4</span></label><input type="range" id="ppl" min="1" max="10" value="4" style="width:100%"><div style="display:flex;justify-content:space-between;font-size:11px;color:#94a3b8"><span>1</span><span>10</span></div></div>';
  h+='<div style="flex:1;min-width:140px"><label style="font-size:13px;font-weight:600;display:block;margin-bottom:6px">Hours sealed: <span id="hV" style="color:#2563eb;font-size:18px">10</span>h</label><input type="range" id="hrs" min="1" max="48" value="10" style="width:100%"><div style="display:flex;justify-content:space-between;font-size:11px;color:#94a3b8"><span>1h</span><span>48h</span></div></div>';
  h+='</div>';
  h+='<div id="ri" style="margin-top:12px;padding:10px;background:#ede9fe;border-radius:8px;font-size:13px;color:#5b21b6;display:flex;flex-wrap:wrap;gap:16px"></div>';
  h+='</div>';

  h+='<div id="cur" style="background:#fff;border-radius:10px;border:1px solid #e2e8f0;padding:16px;margin-bottom:12px"></div>';
  h+='<div id="thr" style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px"></div>';

  h+='<h3 style="font-size:16px;font-weight:700;margin:20px 0 10px">What happens when you open the door?</h3>';
  h+='<div id="scn"></div>';

  // Legend
  h+='<div style="background:#fff;border-radius:10px;border:1px solid #e2e8f0;padding:16px;margin-top:20px">';
  h+='<h4 style="font-size:14px;font-weight:700;margin:0 0 10px">Status Legend</h4>';
  for(var k=0;k<LEGEND.length;k++){
    var lg=LEGEND[k];
    h+='<div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:8px">';
    h+='<span style="padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;display:inline-block;background:'+lg.bg+';color:'+lg.t+';min-width:65px;text-align:center;margin-top:2px">'+lg.l+'</span>';
    h+='<div><span style="font-size:12px;font-weight:700;color:#334155">'+lg.r+'</span>';
    h+='<span style="font-size:12px;color:#64748b"> -- '+lg.d+'</span></div></div>';
  }
  h+='</div>';

  // TL;DR
  h+='<div style="margin-top:12px;padding:14px;border-radius:10px;font-size:13px;background:#fffbeb;border:1px solid #fde68a"><b>TL;DR:</b> A quick open/close barely helps (~4% exchange). You need the door open for <b>at least 5 minutes</b> for a significant difference, and <b>~10 minutes</b> for a near-complete reset.</div>';
  h+='<div style="margin-top:10px;padding:14px;border-radius:10px;font-size:12px;background:#f0fdf4;border:1px solid #bbf7d0;color:#166534"><b>Tip:</b> These are worst-case (perfectly sealed, no wind). Real mamads leak air, and waving a towel near the open door speeds exchange dramatically.</div>';

  // Calculations
  h+='<div style="margin-top:20px;padding:16px;background:#f8fafc;border-radius:10px;border:1px solid #e2e8f0">';
  h+='<h4 style="font-size:15px;font-weight:700;margin-bottom:12px">How Are These Numbers Calculated?</h4>';

  h+='<div style="background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px;font-family:monospace;font-size:13px;line-height:1.7;color:#334155">';
  h+='<b style="font-family:system-ui,sans-serif">Room Volume</b><br>';
  h+='Volume = Width x Length x 2.5m x 1000 (liters)<br>';
  h+='<span style="font-family:system-ui,sans-serif;font-size:12px;color:#64748b">Example: 3 x 3 x 2.5 = 22.5 m3 = 22,500 L</span></div>';

  h+='<div style="background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px;font-family:monospace;font-size:13px;line-height:1.7;color:#334155">';
  h+='<b style="font-family:system-ui,sans-serif">CO2 at Time t</b><br>';
  h+='CO2(t) = (CO2_start + 12 x People x Hours) / Volume x 100%<br>';
  h+='CO2_start = 0.04% x Volume<br>';
  h+='<span style="font-family:system-ui,sans-serif;font-size:12px;color:#64748b">Sleeping adult produces ~12 L/hr CO2, consumes ~15 L/hr O2</span></div>';

  h+='<div style="background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px;font-family:monospace;font-size:13px;line-height:1.7;color:#334155">';
  h+='<b style="font-family:system-ui,sans-serif">Time to Threshold</b><br>';
  h+='Time = (Threshold% x Volume - CO2_start) / (12 x People)<br>';
  h+='<span style="font-family:system-ui,sans-serif;font-size:12px;color:#64748b">Example: 3% in 22,500L with 4 people = (675 - 9) / 48 = 13.9 hours</span></div>';

  h+='<div style="background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px;font-family:monospace;font-size:13px;line-height:1.7;color:#334155">';
  h+='<b style="font-family:system-ui,sans-serif">Door Opening Effect</b><br>';
  h+='CO2_after = 0.04 + (CO2_before - 0.04) x (1 - Exchange%)<br><br>';
  h+='Exchange estimates (no wind):<br>';
  h+='Quick open/close: ~4% | 1 min: ~15% | 2 min: ~27%<br>';
  h+='5 min: ~55% | 10 min: ~85%<br>';
  h+='<span style="font-family:system-ui,sans-serif;font-size:12px;color:#64748b">Based on buoyancy-driven single-sided ventilation studies</span></div>';

  h+='<div style="font-size:12px;color:#64748b;line-height:1.6;margin-top:10px">';
  h+='<b style="color:#334155">Key Assumptions:</b><br>';
  h+='- Perfectly sealed room (worst case)<br>';
  h+='- Sleeping metabolic rate (~0.8 MET)<br>';
  h+='- Outdoor CO2 = 0.04% (400 ppm)<br>';
  h+='- Uniform mixing inside room<br>';
  h+='- Ceiling: 2.5m (standard Israeli residential)</div>';
  h+='<div style="font-size:11px;color:#94a3b8;margin-top:8px">Sources: ASHRAE Fundamentals (metabolic rates), building ventilation research (door exchange).</div>';
  h+='</div>';

  a.innerHTML=h;

  document.getElementById("rW").addEventListener("input",render);
  document.getElementById("rL").addEventListener("input",render);
  document.getElementById("ppl").addEventListener("input",render);
  document.getElementById("hrs").addEventListener("input",render);
  render();
}

init();
</script>
