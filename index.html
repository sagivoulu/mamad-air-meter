function t(k){ return T[lang][k]; }

// ── Data ──────────────────────────────────────────────────────────────────────
var CEIL = 2.5, START_PCT = 0.04;

var AGE_GROUPS = [
  {lk:'infant',   sk:'infantAge',  co2:3,    default:0},
  {lk:'toddler',  sk:'toddlerAge', co2:5,    default:0},
  {lk:'child36',  sk:'child36Age', co2:6,    default:0},
  {lk:'child611', sk:'child611Age',co2:8,    default:0},
  {lk:'preteen',  sk:'preteenAge', co2:11,   default:0},
  {lk:'teen',     sk:'teenAge',    co2:11.5, default:0},
  {lk:'adult',    sk:'adultAge',   co2:12,   default:2}
];

var DOORS = [
  {lk:'door1',dk:'door1desc',exchange:0.04},
  {lk:'door2',dk:'door2desc',exchange:0.15},
  {lk:'door3',dk:'door3desc',exchange:0.27},
  {lk:'door4',dk:'door4desc',exchange:0.55},
  {lk:'door5',dk:'door5desc',exchange:0.85}
];

var LEGEND = [
  {bg:'#dcfce7',tc:'#166534',lk:'safe',   rk:'legR1',dk:'legD1'},
  {bg:'#fef9c3',tc:'#854d0e',lk:'ok',     rk:'legR2',dk:'legD2'},
  {bg:'#fed7aa',tc:'#9a3412',lk:'caution',rk:'legR3',dk:'legD3'},
  {bg:'#fecaca',tc:'#991b1b',lk:'unsafe', rk:'legR4',dk:'legD4'},
  {bg:'#991b1b',tc:'#fff',   lk:'danger', rk:'legR5',dk:'legD5'}
];

// ── Helpers ───────────────────────────────────────────────────────────────────
function badge(co2){
  var bg,tc,lb;
  if(co2<1){bg="#dcfce7";tc="#166534";lb=t('safe');}
  else if(co2<2){bg="#fef9c3";tc="#854d0e";lb=t('ok');}
  else if(co2<3){bg="#fed7aa";tc="#9a3412";lb=t('caution');}
  else if(co2<5){bg="#fecaca";tc="#991b1b";lb=t('unsafe');}
  else{bg="#991b1b";tc="#fff";lb=t('danger');}
  return '<span style="padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;white-space:nowrap;display:inline-block;background:'+bg+';color:'+tc+'">'+lb+'</span>';
}

function bar(val,max,color){
  var w=Math.min(100,(val/max)*100);
  return '<div style="width:100%;height:10px;background:#e5e7eb;border-radius:5px;overflow:hidden"><div style="height:100%;border-radius:5px;transition:width 0.3s;width:'+w+'%;background:'+color+'"></div></div>';
}

function bcol(co2){return co2>=3?"#ef4444":co2>=2?"#f97316":"#22c55e";}

function fh(h){
  if(h===Infinity)return '∞';
  if(h<1)return Math.round(h*60)+t('min');
  var hrs=Math.floor(h),mins=Math.round((h-hrs)*60);
  return mins>0?hrs+t('hr')+' '+mins+t('min'):hrs+t('hr');
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(){
  var W=parseFloat(document.getElementById("rW").value);
  var L=parseFloat(document.getElementById("rL").value);
  var H=parseInt(document.getElementById("hrs").value);
  stateW=String(W); stateL=String(L); stateHrs=String(H);
  document.getElementById("wV").textContent=W;
  document.getElementById("lV").textContent=L;
  document.getElementById("hV").textContent=H;
  document.getElementById("sqm").textContent=(W*L).toFixed(1).replace(/\.0$/,"");

  var P=0, totalCO2Rate=0;
  stateCounts=[];
  for(var g=0;g<AGE_GROUPS.length;g++){
    var cnt=parseInt(document.getElementById("ag"+g).textContent)||0;
    stateCounts.push(cnt);
    P+=cnt;
    totalCO2Rate+=cnt*AGE_GROUPS[g].co2;
  }
  document.getElementById("pV").textContent=P;

  var vol=W*L*CEIL*1000;
  var sL=(START_PCT/100)*vol;
  var co2=(sL+totalCO2Rate*H)/vol*100;
  var cc=co2>=3?"#dc2626":co2>=2?"#ea580c":"#334155";

  document.getElementById("ri").innerHTML=
    '<span><b>'+t('roomLabel')+'</b> '+W+' x '+L+' x '+CEIL+'m</span>'+
    '<span><b>'+t('volumeLabel')+'</b> '+(vol/1000).toFixed(1)+' m³ ('+vol.toLocaleString()+' L)</span>'+
    '<span><b>'+t('floorLabel')+'</b> '+(W*L).toFixed(1)+' m²</span>';

  var o='<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:8px">';
  o+='<span style="font-size:14px;font-weight:600">'+t('co2After')(H,P)+'</span>';
  o+='<span style="font-size:24px;font-weight:800;color:'+cc+'">'+co2.toFixed(2)+'%</span>';
  o+=badge(co2)+'</div>';
  o+=bar(co2,6,bcol(co2));
  o+='<div style="display:flex;justify-content:space-between;font-size:10px;color:#94a3b8;margin-top:2px"><span>0%</span><span>1%</span><span>2%</span><span>'+t('barUnsafe')+'</span><span>'+t('barDanger')+'</span><span>6%</span></div>';
  document.getElementById("cur").innerHTML=o;

  var th=[
    {lk:'discomfort',    p:2,bg:"#fef9c3",bd:"#fde68a",tc:"#854d0e"},
    {lk:'threshUnsafe',  p:3,bg:"#fed7aa",bd:"#fdba74",tc:"#9a3412"},
    {lk:'threshDangerous',p:5,bg:"#fecaca",bd:"#fca5a5",tc:"#991b1b"}
  ];
  var tv='';
  for(var i=0;i<th.length;i++){
    var x=th[i],tm=totalCO2Rate>0?((x.p/100)*vol-sL)/totalCO2Rate:Infinity;
    tv+='<div style="flex:1;min-width:140px;padding:12px;border-radius:10px;text-align:center;background:'+x.bg+';border:1px solid '+x.bd+'">';
    tv+='<div style="font-size:11px;font-weight:600;color:'+x.tc+';margin-bottom:4px">'+t(x.lk)+'</div>';
    tv+='<div style="font-size:20px;font-weight:800;color:'+x.tc+'">'+fh(tm)+'</div></div>';
  }
  document.getElementById("thr").innerHTML=tv;

  var fr=0.04,sc='';
  var inlineEnd=lang==='he'?'left':'right';
  for(var j=0;j<DOORS.length;j++){
    var d=DOORS[j];
    var af=fr+(co2-fr)*(1-d.exchange);
    var dr=co2-af;
    var pd=co2>0.04?(dr/(co2-fr))*100:0;
    var rs=af<0.5;
    sc+='<div style="padding:14px;background:#fff;border-radius:10px;margin-bottom:8px;position:relative;border:'+(rs?'2px solid #22c55e':'1px solid #e2e8f0')+'">';
    if(rs)sc+='<span style="position:absolute;top:-8px;'+inlineEnd+':12px;background:#22c55e;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px">'+t('fullReset')+'</span>';
    sc+='<div style="display:flex;align-items:center;gap:12px;margin-bottom:6px;flex-wrap:wrap">';
    sc+='<span style="font-size:13px;font-weight:700;min-width:200px">'+t(d.lk)+'</span>';
    sc+='<span style="font-size:12px;color:#64748b">~'+Math.round(d.exchange*100)+t('airExchanged')+'</span></div>';
    sc+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">';
    sc+='<span style="font-size:13px;min-width:50px;color:#94a3b8">'+t('before')+'</span>';
    sc+='<div style="flex:1">'+bar(co2,6,"#94a3b8")+'</div>';
    sc+='<span style="font-size:13px;font-weight:600;min-width:55px;text-align:'+inlineEnd+'">'+co2.toFixed(2)+'%</span>';
    sc+=badge(co2)+'</div>';
    sc+='<div style="display:flex;align-items:center;gap:10px">';
    sc+='<span style="font-size:13px;min-width:50px;color:#2563eb;font-weight:600">'+t('after')+'</span>';
    sc+='<div style="flex:1">'+bar(af,6,bcol(af))+'</div>';
    sc+='<span style="font-size:13px;font-weight:700;min-width:55px;text-align:'+inlineEnd+';color:#2563eb">'+af.toFixed(2)+'%</span>';
    sc+=badge(af)+'</div>';
    sc+='<div style="font-size:11px;color:#64748b;margin-top:4px">'+t(d.dk)+' | '+t('dropsBy')(dr.toFixed(2),Math.round(pd))+'</div>';
    sc+='</div>';
  }
  document.getElementById("scn").innerHTML=sc;
}

// ── adj ───────────────────────────────────────────────────────────────────────
function adj(g,d){
  var el=document.getElementById("ag"+g);
  var v=Math.max(0,(parseInt(el.textContent)||0)+d);
  el.textContent=v;
  render();
}

// ── setLang ───────────────────────────────────────────────────────────────────
function setLang(l){
  lang=l;
  init();
}

  var a=document.getElementById("app");
  var rtl=lang==='he';
  a.dir=rtl?'rtl':'ltr';

  var initCounts=stateCounts||AGE_GROUPS.map(function(ag){return ag.default;});
  var totalDefault=initCounts.reduce(function(a,b){return a+b;},0);
  var sqmVal=(parseFloat(stateW)*parseFloat(stateL)).toFixed(1).replace(/\.0$/,'');

  // language toggle + credit
  var h='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">';
  h+='<div style="display:flex;align-items:center;gap:6px;background:#fff;border:1px solid #e2e8f0;border-radius:99px;padding:4px 10px;font-size:13px">';
  h+='<span onclick="setLang(\'he\')" style="display:flex;align-items:center;gap:4px;padding:2px 8px;border-radius:99px;cursor:pointer;font-weight:'+(lang==='he'?'700':'400')+';color:'+(lang==='he'?'#1e293b':'#94a3b8')+';background:'+(lang==='he'?'#eff6ff':'transparent')+'">🇮🇱 עב</span>';
  h+='<span style="color:#e2e8f0">|</span>';
  h+='<span onclick="setLang(\'en\')" style="display:flex;align-items:center;gap:4px;padding:2px 8px;border-radius:99px;cursor:pointer;font-weight:'+(lang==='en'?'700':'400')+';color:'+(lang==='en'?'#1e293b':'#94a3b8')+';background:'+(lang==='en'?'#eff6ff':'transparent')+'">🇬🇧 EN</span>';
  h+='</div>';
  h+='<div style="font-size:12px;color:#64748b">'+t('builtBy')+' <a href="https://github.com/sagivoulu/mamad-air-meter" target="_blank" style="color:#2563eb;font-weight:600">Sagiv Oulu</a> &middot; <a href="https://github.com/sagivoulu/mamad-air-meter" target="_blank" style="color:#2563eb">GitHub</a></div>';
  h+='</div>';

  h+='<h2 style="font-size:22px;font-weight:700;margin-bottom:4px">'+t('title')+'</h2>';
  h+='<p style="font-size:13px;color:#64748b;margin-bottom:16px">'+t('subtitle')+'</p>';

  // intro
  h+='<div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:12px;padding:18px;margin-bottom:24px;font-size:14px;line-height:1.7;color:#1e3a5f">';
  h+='<p style="margin:0 0 10px"><b>'+t('whatIsThis')+'</b> '+t('intro1')+'</p>';
  h+='<p style="margin:0 0 10px">'+t('intro2')+'</p>';
  h+='<p style="margin:0 0 12px"><b>'+t('howToUse')+'</b></p>';
  h+='<ol style="margin:0;padding-'+(rtl?'right':'left')+':20px">';
  h+='<li style="margin-bottom:6px">'+t('step1')+'</li>';
  h+='<li style="margin-bottom:6px">'+t('step2')+'</li>';
  h+='<li style="margin-bottom:6px">'+t('step3')+'</li>';
  h+='<li>'+t('step4')+'</li>';
  h+='</ol></div>';

  // disclaimer
  h+='<div style="background:#fefce8;border:1px solid #fde047;border-radius:10px;padding:14px;margin-bottom:20px;font-size:12px;line-height:1.6;color:#713f12">';
  h+='<b>'+t('disclaimerLabel')+'</b> '+t('disclaimerText');
  h+='</div>';

  // controls
  h+='<div style="background:#f8fafc;border-radius:10px;border:1px solid #e2e8f0;padding:16px;margin-bottom:20px">';
  h+='<div style="display:flex;gap:20px;flex-wrap:wrap;margin-bottom:8px">';
  h+='<div style="flex:1;min-width:140px"><label style="font-size:13px;font-weight:600;display:block;margin-bottom:6px">'+t('roomWidth')+' <span id="wV" style="color:#7c3aed;font-size:18px">'+stateW+'</span>m</label><input type="range" id="rW" min="1.5" max="10" step="0.5" value="'+stateW+'" style="width:100%"><div style="display:flex;justify-content:space-between;font-size:11px;color:#94a3b8"><span>1.5m</span><span>10m</span></div></div>';
  h+='<div style="flex:1;min-width:140px"><label style="font-size:13px;font-weight:600;display:block;margin-bottom:6px">'+t('roomLength')+' <span id="lV" style="color:#7c3aed;font-size:18px">'+stateL+'</span>m</label><input type="range" id="rL" min="1.5" max="10" step="0.5" value="'+stateL+'" style="width:100%"><div style="display:flex;justify-content:space-between;font-size:11px;color:#94a3b8"><span>1.5m</span><span>10m</span></div></div>';
  h+='</div>';
  h+='<div style="margin-bottom:12px;font-size:13px;color:#5b21b6;font-weight:600">'+t('floorArea')+' <span id="sqm" style="font-size:18px">'+sqmVal+'</span> m²</div>';
  h+='<div style="margin-bottom:12px"><label style="font-size:13px;font-weight:600;display:block;margin-bottom:8px">'+t('peopleSleeping')+' <span id="pV" style="color:#2563eb;font-size:18px">'+totalDefault+'</span></label>';
  h+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px">';
  for(var gi=0;gi<AGE_GROUPS.length;gi++){
    var ag=AGE_GROUPS[gi];
    var cnt=initCounts[gi];
    h+='<div style="background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:10px;display:flex;align-items:center;justify-content:space-between;gap:8px">';
    h+='<div><div style="font-size:12px;font-weight:600;color:#334155">'+t(ag.lk)+'</div>';
    h+='<div style="font-size:11px;color:#94a3b8">'+t(ag.sk)+' &middot; '+ag.co2+' L/hr CO2</div></div>';
    h+='<div style="display:flex;align-items:center;gap:6px">';
    h+='<button onclick="adj('+gi+',-1)" style="width:26px;height:26px;border-radius:50%;border:1px solid #cbd5e1;background:#f8fafc;font-size:16px;cursor:pointer;line-height:1;color:#334155">−</button>';
    h+='<span id="ag'+gi+'" style="min-width:20px;text-align:center;font-size:16px;font-weight:700;color:#2563eb">'+cnt+'</span>';
    h+='<button onclick="adj('+gi+',1)" style="width:26px;height:26px;border-radius:50%;border:1px solid #cbd5e1;background:#f8fafc;font-size:16px;cursor:pointer;line-height:1;color:#334155">+</button>';
    h+='</div></div>';
  }
  h+='</div></div>';
  h+='<div style="margin-bottom:0"><label style="font-size:13px;font-weight:600;display:block;margin-bottom:6px">'+t('hoursSealed')+' <span id="hV" style="color:#2563eb;font-size:18px">'+stateHrs+'</span>'+t('hr')+'</label><input type="range" id="hrs" min="1" max="48" value="'+stateHrs+'" style="width:100%"><div style="display:flex;justify-content:space-between;font-size:11px;color:#94a3b8"><span>1'+t('hr')+'</span><span>48'+t('hr')+'</span></div></div>';
  h+='<div id="ri" style="margin-top:12px;padding:10px;background:#ede9fe;border-radius:8px;font-size:13px;color:#5b21b6;display:flex;flex-wrap:wrap;gap:16px"></div>';
  h+='</div>';

  h+='<div id="cur" style="background:#fff;border-radius:10px;border:1px solid #e2e8f0;padding:16px;margin-bottom:12px"></div>';
  h+='<div id="thr" style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px"></div>';

  h+='<h3 style="font-size:16px;font-weight:700;margin:20px 0 10px">'+t('doorSectionTitle')+'</h3>';
  h+='<div id="scn"></div>';

  // legend
  h+='<div style="background:#fff;border-radius:10px;border:1px solid #e2e8f0;padding:16px;margin-top:20px">';
  h+='<h4 style="font-size:14px;font-weight:700;margin:0 0 10px">'+t('statusLegend')+'</h4>';
  for(var k=0;k<LEGEND.length;k++){
    var lg=LEGEND[k];
    h+='<div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:8px">';
    h+='<span style="padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;display:inline-block;background:'+lg.bg+';color:'+lg.tc+';min-width:65px;text-align:center;margin-top:2px">'+t(lg.lk)+'</span>';
    h+='<div><span style="font-size:12px;font-weight:700;color:#334155">'+t(lg.rk)+'</span>';
    h+='<span style="font-size:12px;color:#64748b"> -- '+t(lg.dk)+'</span></div></div>';
  }
  h+='</div>';

  // TL;DR + tip
  h+='<div style="margin-top:12px;padding:14px;border-radius:10px;font-size:13px;background:#fffbeb;border:1px solid #fde68a"><b>'+t('tldrLabel')+'</b> '+t('tldrText')+'</div>';
  h+='<div style="margin-top:10px;padding:14px;border-radius:10px;font-size:12px;background:#f0fdf4;border:1px solid #bbf7d0;color:#166534"><b>'+t('tipLabel')+'</b> '+t('tipText')+'</div>';

  // calculations — always LTR, formulas and sources stay in English
  h+='<div style="margin-top:20px;padding:16px;background:#f8fafc;border-radius:10px;border:1px solid #e2e8f0" dir="ltr">';
  h+='<h4 style="font-size:15px;font-weight:700;margin-bottom:12px">'+t('calcTitle')+'</h4>';

  h+='<div style="background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px;font-family:monospace;font-size:13px;line-height:1.7;color:#334155">';
  h+='<b style="font-family:system-ui,sans-serif">Room Volume</b><br>';
  h+='Volume = Width x Length x 2.5m x 1000 (liters)<br>';
  h+='<span style="font-family:system-ui,sans-serif;font-size:12px;color:#64748b">Example: 3 x 3 x 2.5 = 22.5 m3 = 22,500 L</span></div>';

  h+='<div style="background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px;font-family:monospace;font-size:13px;line-height:1.7;color:#334155">';
  h+='<b style="font-family:system-ui,sans-serif">CO2 at Time t</b><br>';
  h+='CO2(t) = (CO2_start + TotalRate x Hours) / Volume x 100%<br>';
  h+='TotalRate = sum of (count per age group x CO2 rate for that group)<br>';
  h+='CO2_start = 0.04% x Volume<br>';
  h+='<span style="font-family:system-ui,sans-serif;font-size:12px;color:#64748b">CO2 rates are based on sleeping metabolic rate (MET = 0.95) and typical body mass per age group (Persily &amp; de Jonge, 2017)</span></div>';

  h+='<div style="background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px;">';
  h+='<b style="font-size:13px;font-weight:700;color:#334155">CO2 Production by Age Group (sleeping)</b>';
  h+='<table style="width:100%;border-collapse:collapse;font-size:12px;margin-top:8px">';
  h+='<thead><tr style="background:#f8fafc;color:#64748b">';
  h+='<th style="text-align:left;padding:6px 8px;border-bottom:1px solid #e2e8f0">Age Group</th>';
  h+='<th style="text-align:left;padding:6px 8px;border-bottom:1px solid #e2e8f0">Typical body mass</th>';
  h+='<th style="text-align:center;padding:6px 8px;border-bottom:1px solid #e2e8f0">CO2 (L/hr)</th>';
  h+='<th style="text-align:center;padding:6px 8px;border-bottom:1px solid #e2e8f0">vs. adult</th>';
  h+='</tr></thead><tbody>';
  var ageRows=[
    ["Infant (under 1 yr)","~8 kg","3","25%"],
    ["Toddler (1–3 yrs)","~12 kg","5","40%"],
    ["Child (3–6 yrs)","~18 kg","6","51%"],
    ["Child (6–11 yrs)","~32 kg","8","67%"],
    ["Pre-teen (11–16 yrs)","~57 kg","11","89%"],
    ["Teen (16–21 yrs)","~72 kg","11.5","94%"],
    ["Adult (21+ yrs)","~78 kg","12","100%"]
  ];
  for(var ri=0;ri<ageRows.length;ri++){
    var rw=ageRows[ri],odd=ri%2===0;
    h+='<tr style="background:'+(odd?'#fff':'#f8fafc')+'">';
    h+='<td style="padding:6px 8px;color:#334155;font-weight:'+(ri===6?'700':'400')+'">'+rw[0]+'</td>';
    h+='<td style="padding:6px 8px;color:#64748b">'+rw[1]+'</td>';
    h+='<td style="padding:6px 8px;text-align:center;font-weight:600;color:#334155">'+rw[2]+'</td>';
    h+='<td style="padding:6px 8px;text-align:center;color:#64748b">'+rw[3]+'</td>';
    h+='</tr>';
  }
  h+='</tbody></table>';
  h+='<div style="font-size:11px;color:#94a3b8;margin-top:8px">Source: Persily &amp; de Jonge (2017), scaled to MET = 0.95 (sleeping). Body masses from NHANES, sex-averaged.</div>';
  h+='</div>';

  h+='<div style="background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px;font-family:monospace;font-size:13px;line-height:1.7;color:#334155">';
  h+='<b style="font-family:system-ui,sans-serif">Time to Threshold</b><br>';
  h+='Time = (Threshold% x Volume - CO2_start) / (12 x People)<br>';
  h+='<span style="font-family:system-ui,sans-serif;font-size:12px;color:#64748b">Example: 3% in 22,500L with 4 people = (675 - 9) / 48 = 13.9 hours</span></div>';

  h+='<div style="background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px;font-family:monospace;font-size:13px;line-height:1.7;color:#334155">';
  h+='<b style="font-family:system-ui,sans-serif">Door Opening Effect</b><br>';
  h+='CO2_after = 0.04 + (CO2_before - 0.04) x (1 - Exchange%)<br><br>';
  h+='Exchange estimates (no wind):<br>';
  h+='Quick open/close: ~4% | 1 min: ~15% | 2 min: ~27%<br>';
  h+='5 min: ~55% | 10 min: ~85%<br>';
  h+='<span style="font-family:system-ui,sans-serif;font-size:12px;color:#64748b">Based on buoyancy-driven single-sided ventilation studies</span></div>';

  h+='<div style="font-size:12px;color:#64748b;line-height:1.6;margin-top:10px">';
  h+='<b style="color:#334155">Key Assumptions:</b><br>';
  h+='- Perfectly sealed room (worst case)<br>';
  h+='- Sleeping metabolic rate (MET = 0.95 across all ages)<br>';
  h+='- CO2 rates per age group from Persily &amp; de Jonge (2017), scaled to sleeping MET<br>';
  h+='- Outdoor CO2 = 0.04% (400 ppm)<br>';
  h+='- Uniform mixing inside room<br>';
  h+='- Ceiling: 2.5m (standard Israeli residential)</div>';
  h+='<div style="font-size:11px;color:#94a3b8;margin-top:8px;line-height:1.8">';
  h+='<b style="color:#64748b">Sources:</b><br>';
  h+='Persily &amp; de Jonge (2017). "Carbon dioxide generation rates for building occupants." <i>Indoor Air</i>, 27(5), 868–879. <a href="https://doi.org/10.1111/ina.12383" target="_blank" style="color:#94a3b8">doi:10.1111/ina.12383</a><br>';
  h+='Fan et al. (2021). "Emission rate of carbon dioxide while sleeping." <i>Indoor Air</i>, 31(6), 2142–2157. <a href="https://doi.org/10.1111/ina.12911" target="_blank" style="color:#94a3b8">doi:10.1111/ina.12911</a><br>';
  h+='Wu et al. (2023). "Carbon dioxide generation rates for children and adolescents." <i>Building and Environment</i>, 237, 110310. <a href="https://doi.org/10.1016/j.buildenv.2023.110310" target="_blank" style="color:#94a3b8">doi:10.1016/j.buildenv.2023.110310</a><br>';
  h+='Gao et al. (2023). "Metabolic rate in children and adolescents." <i>Building and Environment</i>, 244, 110804. <a href="https://doi.org/10.1016/j.buildenv.2023.110804" target="_blank" style="color:#94a3b8">doi:10.1016/j.buildenv.2023.110804</a><br>';
  h+='Ainsworth et al. Compendium of Physical Activities (sleeping MET = 0.95). ASHRAE Fundamentals (door exchange).';
  h+='</div>';
  h+='</div>';

  a.innerHTML=h;

  document.getElementById("rW").addEventListener("input",render);
  document.getElementById("rL").addEventListener("input",render);
  document.getElementById("hrs").addEventListener("input",render);
  render();
}

init();
</script>
